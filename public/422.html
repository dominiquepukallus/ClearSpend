<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Page Not Found - ClearSpend</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@400;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f4f5f7;
      color: #1B2B4B;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      text-align: center;
      background: white;
      padding: 3rem 2rem;
      border-radius: 1rem;
      box-shadow: 4px 2px 16px #B5D4F4;
      border: 1px solid #e5e7eb;
    }

    h1 {
      font-family: 'Londrina Solid', cursive;
      font-size: 6rem;
      color: #1B2B4B;
      margin-bottom: 1rem;
      line-height: 1;
    }

    h2 {
      font-family: 'Londrina Solid', cursive;
      font-size: 2rem;
      color: #1B2B4B;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.125rem;
      color: #6b7280;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      background: #1B2B4B;
      color: white;
      padding: 0.875rem 2rem;
      border-radius: 0.75rem;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.3s;
      box-shadow: 0 2px 16px rgba(27, 43, 75, 0.2);
    }

    a:hover {
      background: #85B7EB;
    }

    .emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🚫</div>
    <h1>422</h1>
    <h2>Change Rejected</h2>
    <p>The change you wanted was rejected. Maybe you tried to change something you didn't have access to.</p>
  </div>
</body>
</html>
